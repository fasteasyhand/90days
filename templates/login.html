{% extends "base.html" %}
{% block title %}เข้าสู่ระบบ{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh]">
  <div class="w-full">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">📋</div>
      <h1 class="text-2xl font-bold text-gray-800">รายงานตัว 90 วัน</h1>
      <p class="text-gray-500 text-sm mt-1">บริการยื่นแบบ ตม.47 ทางไปรษณีย์</p>
    </div>

    <!-- Step 1: ใส่เบอร์ -->
    <div id="step-phone">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="font-semibold text-gray-700 mb-4">เข้าสู่ระบบ</h2>
        <label class="block text-sm text-gray-600 mb-1">เบอร์โทรศัพท์</label>
        <input id="phone" type="tel" inputmode="numeric" maxlength="10"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
               placeholder="0812345678">
        <button onclick="checkPhone()"
                class="mt-4 w-full bg-blue-600 text-white font-semibold py-3 rounded-xl active:bg-blue-700">
          ถัดไป
        </button>
        <p class="text-center text-sm text-gray-400 mt-4">
          ยังไม่มีบัญชี? <a href="/register" class="text-blue-600 font-medium">ลงทะเบียน</a>
        </p>
      </div>
    </div>

    <!-- Step 2a: OTP (worker) -->
    <div id="step-otp" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <button onclick="backToPhone()" class="text-gray-400 text-sm mb-4 flex items-center gap-1">← กลับ</button>
        <h2 class="font-semibold text-gray-700 mb-1">ใส่รหัส OTP</h2>
        <p class="text-sm text-gray-400 mb-4">ส่งไปทาง LINE OA แล้ว (5 นาที)</p>
        <input id="otp" type="text" inputmode="numeric" maxlength="6"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-2xl tracking-widest text-center focus:outline-none focus:ring-2 focus:ring-blue-400"
               placeholder="000000">
        <button onclick="verifyOTP()"
                class="mt-4 w-full bg-blue-600 text-white font-semibold py-3 rounded-xl active:bg-blue-700">
          ยืนยัน
        </button>
        <button onclick="sendOTP()" class="mt-2 w-full text-sm text-gray-400 py-2">
          ส่งรหัสใหม่
        </button>
      </div>
    </div>

    <!-- Step 2b: Password (staff/admin) -->
    <div id="step-password" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <button onclick="backToPhone()" class="text-gray-400 text-sm mb-4 flex items-center gap-1">← กลับ</button>
        <h2 class="font-semibold text-gray-700 mb-1">ใส่รหัสผ่าน</h2>
        <p id="staff-phone-label" class="text-sm text-gray-400 mb-4"></p>
        <input id="password" type="password"
               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
               placeholder="รหัสผ่าน">
        <button onclick="loginPassword()"
                class="mt-4 w-full bg-gray-800 text-white font-semibold py-3 rounded-xl active:bg-gray-900">
          เข้าสู่ระบบ
        </button>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPhone = '';

async function checkPhone() {
  const phone = document.getElementById('phone').value.trim();
  if (!/^0[6-9]\d{8}$/.test(phone)) {
    showToast('กรุณาใส่เบอร์โทร 10 หลักที่ถูกต้อง', 'error'); return;
  }
  currentPhone = phone;
  try {
    const res = await fetch(`/api/auth/check-role?phone=${phone}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);

    document.getElementById('step-phone').classList.add('hidden');

    if (data.role === 'staff' || data.role === 'admin') {
      // Staff/Admin → password
      document.getElementById('staff-phone-label').textContent = phone;
      document.getElementById('step-password').classList.remove('hidden');
      document.getElementById('password').focus();
    } else {
      // Worker → OTP
      await sendOTP();
    }
  } catch(e) { showToast(e.message, 'error'); }
}

async function sendOTP() {
  try {
    const fd = new FormData(); fd.append('phone', currentPhone);
    const res = await fetch('/api/auth/send-otp', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);
    document.getElementById('step-phone').classList.add('hidden');
    document.getElementById('step-otp').classList.remove('hidden');
    document.getElementById('otp').focus();
    if (data.message?.includes('DEV')) showToast(data.message);
  } catch(e) { showToast(e.message, 'error'); }
}

async function verifyOTP() {
  const otp = document.getElementById('otp').value.trim();
  if (otp.length !== 6) { showToast('OTP 6 หลัก', 'error'); return; }
  try {
    const fd = new FormData(); fd.append('phone', currentPhone); fd.append('otp', otp);
    const res = await fetch('/api/auth/verify-otp', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);
    redirect(data.role);
  } catch(e) { showToast(e.message, 'error'); }
}

async function loginPassword() {
  const password = document.getElementById('password').value;
  if (!password) { showToast('กรุณาใส่รหัสผ่าน', 'error'); return; }
  try {
    const fd = new FormData(); fd.append('phone', currentPhone); fd.append('password', password);
    const res = await fetch('/api/auth/login-password', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);
    redirect(data.role);
  } catch(e) { showToast(e.message, 'error'); }
}

function redirect(role) {
  if (role === 'admin') window.location.href = '/admin/dashboard';
  else if (role === 'staff') window.location.href = '/staff/dashboard';
  else window.location.href = '/worker/dashboard';
}

function backToPhone() {
  document.getElementById('step-otp').classList.add('hidden');
  document.getElementById('step-password').classList.add('hidden');
  document.getElementById('step-phone').classList.remove('hidden');
}

document.getElementById('phone').addEventListener('keydown', e => { if (e.key === 'Enter') checkPhone(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('step-otp').classList.contains('hidden')) verifyOTP();
    if (!document.getElementById('step-password').classList.contains('hidden')) loginPassword();
  }
});
</script>
{% endblock %}
